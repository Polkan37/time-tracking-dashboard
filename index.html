<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>Frontend Mentor | Time tracking dashboard</title>

  <link rel="stylesheet" href="./css/index.css">
  <script src="./js/index.js" defer></script>
</head>

<body>
  <div class="container">
    <div class="user">
      <div class="user-card">
        <img src="./images/image-jeremy.png" alt="Jeremy Robson" class="user-card__image">
        <div class="user-card__text">
          <span>Report for</span>
          <p class="user-card__title">Jeremy Robson</p>
        </div>
      </div>
      <nav class="navigation">
        <ul>
          <li><button>Daily</button></li>
          <li><button class="active">Weekly</button></li>
          <li><button>Monthly</button></li>
        </ul>
      </nav>
    </div>
    <div class="trackers"></div>
  </div>
</body>

</html>
